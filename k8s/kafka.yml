apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: airline
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: airline
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.3.1
          # Use args (not command) so /entrypoint.sh routes through rpk
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - 1G
            - --mode
            - dev-container
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://kafka.airline.svc.cluster.local:9092
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - kafka-0.kafka.airline.svc.cluster.local:33145
          ports:
            - containerPort: 9092
            - containerPort: 9644
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
